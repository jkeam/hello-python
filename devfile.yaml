schemaVersion: 2.2.2
metadata:
  name: hello-python
components:
  - name: python
    container:
      image: registry.redhat.io/devspaces/udi-rhel9:3.27
      endpoints:
        - exposure: public
          name: app
          targetPort: 8080
          protocol: https
      volumeMounts:
        - name: venv
          path: /home/user/.venv
      memoryLimit: '2Gi'
      memoryRequest: '1Gi'
      cpuLimit: '2'
      cpuRequest: '1'
      mountSources: true
  - name: venv
    volume:
      size: 1G
commands:
  - id: install-dependencies
    exec:
      label: "Install dependencies"
      component: python
      workingDir: ${PROJECT_SOURCE}
      commandLine: pip install -r ./requirements.txt
      group:
        kind: build
  - id: run
    exec:
      label: "Run the application"
      component: python
      workingDir: ${PROJECT_SOURCE}
      commandLine: python app.py
      group:
        kind: run

